name: Build release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v41
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        run: py -3.11 -m venv .venv

      - name: Install requirements
        run: .\.venv\Scripts\python.exe -m app.requirements_sync --include-build

      - name: Build installer and portable assets
        run: .\.venv\Scripts\python.exe tools\build_release_assets.py

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: NTE Tool ${{ github.event.inputs.tag || github.ref_name }}
          files: release/*
